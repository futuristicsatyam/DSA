services:
  - type: web
    name: dsa-suite-api
    runtime: node
    rootDir: apps/api
    plan: free
    buildCommand: npm install && npx prisma generate --schema prisma/schema.prisma && npm run build && (npx prisma migrate deploy --schema prisma/schema.prisma || npx prisma db push --schema prisma/schema.prisma)
    startCommand: npm run start
    healthCheckPath: /api/v1/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: FEATURE_ONLINE_JUDGE
        value: false
